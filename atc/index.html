<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATC BOARD</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="title-block">
        <p class="subtitle">Mission Planning Interface</p>
        <h1 class="title">ATC BOARD</h1>
        <p class="topbar-note">Tableau central de suivi ATC. Les strips se selectionnent a la volee, se transferent entre secteurs et se pilotent depuis la barre de commandes.</p>
      </div>

      <div class="toolbar">
        <div class="load-brief-group">
          <input class="tool-input" id="missionIdInput" type="text" placeholder="Mission ID" maxlength="12" />
          <button class="tool-btn tool-btn-blue" id="loadMissionBtn" type="button">Load</button>
          <div class="load-status" id="loadStatus" aria-live="polite">Board vide</div>
        </div>
        <button class="tool-btn tool-btn-gold" id="createPackageBtn" type="button">New</button>
        <button class="tool-btn tool-btn-green" id="addSectorBtn" type="button">Add</button>
        <button class="tool-btn tool-btn-green" id="removeSectorBtn" type="button">Rmv</button>
        <a class="tool-btn" href="../index.html">Menu</a>
        <div class="clock-stack">
          <div class="clock-box" id="clockBox" aria-live="polite">--:--:--</div>
          <div class="game-clock-panel">
            <div class="game-clock-display" id="gameClockDisplay" aria-live="polite">--:--:--</div>
            <div class="game-clock-controls">
              <input class="game-clock-input" id="gameClockInput" type="time" step="1" value="08:00:00" />
              <button class="tool-btn tool-btn-compact" id="syncGameClockBtn" type="button">Sync</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="board-shell">
      <section class="board-grid" id="boardGrid"></section>
      <footer class="board-actions-bar">
        <div class="board-actions-status">
          <div class="board-actions-chip">
            <div class="board-actions-label">Strip</div>
            <div class="board-actions-value" id="selectedStripLabel">Aucune</div>
          </div>
          <div class="board-actions-chip">
            <div class="board-actions-label">Data</div>
            <div class="board-actions-meta" id="selectedStripMeta">--</div>
          </div>
          <div class="board-actions-chip">
            <div class="board-actions-label">Route</div>
            <div class="board-actions-route" id="selectedStripRoute">--</div>
          </div>
          <div class="board-actions-chip board-actions-chip-notes">
            <div class="board-actions-label">Notes</div>
            <div class="board-actions-notes" id="selectedStripNotes">Aucune note.</div>
          </div>
        </div>

        <div class="board-actions-controls">
          <button class="board-action-btn board-action-btn--gold" id="notesActionBtn" type="button">Nts</button>
          <button class="board-action-btn board-action-btn--blue" id="editStripActionBtn" type="button">Mod</button>
          <button class="board-action-btn board-action-btn--green" id="controlActionBtn" type="button">Ctr</button>
          <button class="board-action-btn" id="clearanceActionBtn" type="button">Clr</button>
          <button class="board-action-btn board-action-btn--danger" id="emergencyActionBtn" type="button">Emy</button>
          <button class="board-action-btn board-action-btn--danger" id="deleteActionBtn" type="button">Trash</button>
        </div>
      </footer>
    </main>
  </div>

  <script src="./app.js" defer></script>
</body>
</html>
